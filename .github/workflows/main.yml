name: Main web build

run-name: "🛠️ ${{ github.event.head_commit.message || github.event.pull_request.title }}"

on:
  push:

  workflow_dispatch:
    inputs:
      reason:
        description: Reason for manual run
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v6

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.5.0
          cache: yarn

      - name: 💾 Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: 💾 Restore yarn cache
        uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: 📦 Install dependencies
        run: yarn install marcin-react

      - name: 🚧 Run build
        run: yarn build marcin-react

      - name: ✨ Run lint
        run: yarn lint marcin-react

      - name: 🧪 Run tests
        run: yarn test marcin-react
