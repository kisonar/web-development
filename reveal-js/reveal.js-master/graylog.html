<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>reveal.js</title>
    <link rel="stylesheet" href="dist/reset.css">
    <link rel="stylesheet" href="dist/reveal.css">
    <link rel="stylesheet" href="dist/theme/black.css">
    <!-- Theme used for syntax highlighted code -->
    <link rel="stylesheet" href="plugin/highlight/monokai.css">
</head>
<body>
<div class="reveal">
    <div class="slides">
        <section data-markdown>
				  <textarea data-template>
                      Graylog - a practial alternative for LOGs
                      <p>marcin.migdal@fortum.com</p>
				  </textarea>
        </section>
        <section data-markdown>
				  <textarea data-template>
                      Problem zbierania i przetwarzania logow z heterogenicznych systemow oraz serwisow
				  </textarea>
        </section>
        <section data-markdown>
				  <textarea data-template>
                      Formaty logow:

                      dowolny format tekstowy, JSON, XML

                      Windows Event logs

                      Common Event Format (CEF)

                      NCSA Common Log Format (CLF)

                      Extended Log Format (ELF)

                      W3C Extended Log File Format
				  </textarea>
        </section>
        <section data-markdown>
				  <textarea data-template>
                    Common Log Format - NCSA Common log format

                    host identifier authuser date request status bytes

                    127.0.0.1 user-identifier frank [10/Oct/2000:13:55:36 -0700] "GET /apache_pb.gif HTTP/1.0" 200 2326
				  </textarea>
        </section>
        <section data-markdown>
				  <textarea data-template>
                    Windows, Linux , MacOS, zOS, ChromeOS

                    serwisy z chmur (AWS, Azure, GoogleCloudPlatform)

                    pliki (dostarczane przez FTP)
				  </textarea>
        </section>
        <section data-markdown>
				  <textarea data-template>
                    Kombajn do przetwarzania logów

                    Graylog, Inc to firma zajmująca się oprogramowaniem do zarządzania logami i analizą bezpieczeństwa z siedzibą w Houston w Teksasie.

                    Ich głównym produktem jest oprogramowanie do zarządzania logami zwane Graylog.

                    Wersje: enterprise oraz standardowa.
				  </textarea>
        </section>
        <section data-markdown>
				  <textarea data-template>
                      Stos technologiczny:

                      Graylog - samo narzędzie, nasz kombajn.

                      MongodDb - storage na definicje konfiguracji elementów infry Grayloga tj wejscia, streamy, rule itd

                      ElasticSearch/OpenSearch - kontener na przetowrzoną zawartośc logów

                      Sugestia: najlepiej wszystko klastryzowac.
				  </textarea>
        </section>
        <section data-markdown>
					<textarea data-template>
                        Rozszerzenia:

                        Do ElasticSearch/Opensearch można podpiąc Grafane i zasilic Grafane danymi z ES/OS

                        NxLog - zbiera logi i wysyła do Grayloga
					</textarea>
        </section>
        <section data-markdown>
					<textarea data-template>
                        Kontr opcja: ELK stack

                        LogStash + ElasticSearch + Kibana
					</textarea>
        </section>
        <section data-markdown>
					<textarea data-template>
                        Zakres demo na dziś - podstawowe elementy.

                        1) runtime z dockerem

                        2) definiowanie wejsc

                        3) podzial na streamy wraz z regulkami

                        4) przetwarzanie runtimowe
					</textarea>
        </section>
        <section data-markdown>
					<textarea data-template>
                        NxLog + Graylog + MongoDb + ElasticSearch

                        Wejscie: TCP GELF skanujace zawrtosc plikow linia po linii
					</textarea>
        </section>

    </div>
</div>

<script src="dist/reveal.js"></script>
<script src="plugin/notes/notes.js"></script>
<script src="plugin/markdown/markdown.js"></script>
<script src="plugin/highlight/highlight.js"></script>
<script>
    // More info about initialization & config:
    // - https://revealjs.com/initialization/
    // - https://revealjs.com/config/
    Reveal.initialize({
        hash: true,
        width: 1400,
        height: 900,
        margin: 0.04,
        // Learn about plugins: https://revealjs.com/plugins/
        plugins: [RevealMarkdown, RevealHighlight, RevealNotes]
    });
</script>
</body>
</html>
